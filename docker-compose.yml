services:
  php:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: car_louage
    ports:
      - "3307:3306"
    volumes:
      - ./car_louage.sql:/docker-entrypoint-initdb.d/car_louage.sql